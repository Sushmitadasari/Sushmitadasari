<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
<defs>
  <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1E293B">
      <animate attributeName="stop-color" values="#1E293B;#6D28D9;#0E7490;#1E293B" dur="9s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#6D28D9">
      <animate attributeName="stop-color" values="#6D28D9;#0E7490;#1E293B;#6D28D9" dur="9s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="30%" cy="20%" r="80%">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#F6F8FA"/>
  </radialGradient>
  <style>
    .ascii  { font-family: 'Courier New', Consolas, monospace; font-size: 7.4px; fill: url(#asciiGrad); letter-spacing: -0.2px; }
    .key    { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #0969DA; font-weight: bold; }
    .value  { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #24292F; }
    .cc     { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #6E7781; }
    .head   { font-family: 'Courier New', Consolas, monospace; font-size: 17px; fill: #6D28D9; font-weight: bold; }
    .accent { font-family: 'Courier New', Consolas, monospace; font-size: 15px; fill: #059669; font-weight: bold; }
    text, tspan { white-space: pre; }
  </style>
</defs>

<rect width="1180" height="560" rx="18" fill="url(#bgGlow)"/>

